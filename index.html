window.pdfAnnuale=async function(){
  try{
    const jsPDF=await getJsPDF();
    const doc=new jsPDF();const W=210,M=14;let y=20;
    const anno=new Date().getFullYear();
    const lavReali=lav.filter(l=>!l._sfPersoManuale&&!l.manuale);
    const sfPersiManuali=lav.filter(l=>l._sfPersoManuale);
    doc.setFontSize(20);doc.setFont('helvetica','bold');doc.setTextColor(249,115,22);doc.text('METALTRACK — Report Annuale '+anno,M,y);y+=8;
    doc.setFontSize(8);doc.setTextColor(120);doc.text('Generato il '+new Date().toLocaleString('it-IT'),M,y);y+=12;
    const mNomi=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
    let totGlob={pezzi:0,peso:0,sfR:0,sfP:0,costo:0};
    for(let mi=0;mi<12;mi++){
      const mm=String(mi+1).padStart(2,'0');
      const mmMatch=l=>l.date&&(()=>{const p=l.date.split('/');return p.length>=3&&p[1]===mm&&p[2].startsWith(String(anno));})();
      const meseL=lavReali.filter(mmMatch);
      const meseSfManuali=sfPersiManuali.filter(mmMatch);
      if(meseL.length===0&&meseSfManuali.length===0)continue;
      if(y>250){doc.addPage();y=20;}
      const mesePeso=meseL.reduce((a,l)=>a+l.pp,0);
      // FIX: sfrido perso mensile = lavorazioni + manuali
      const meseSfPLav=meseL.filter(l=>l.sf&&!l.sfu&&l.psf>0).reduce((a,l)=>a+l.psf,0);
      const meseSfPMan=meseSfManuali.reduce((a,l)=>a+l.psf,0);
      const meseSfP=meseSfPLav+meseSfPMan;
      const meseSfR=meseL.filter(l=>l.sfu&&l.psf>0).reduce((a,l)=>a+l.psf,0);
      const meseCosto=meseL.reduce((a,l)=>a+l.ctot,0);
      totGlob.pezzi+=meseL.length;totGlob.peso+=mesePeso;totGlob.sfR+=meseSfR;totGlob.sfP+=meseSfP;totGlob.costo+=meseCosto;
      doc.setFillColor(249,115,22);doc.rect(M,y-4,W-M*2,8,'F');
      doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(255);doc.text(mNomi[mi]+' '+anno,M+2,y+1);y+=8;
      doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(80);
      doc.text(`Lav: ${meseL.length} | Peso: ${fmt(mesePeso,2)} kg | ♻️: ${fmt(meseSfR,2)} kg | Perso: ${fmt(meseSfP,2)} kg | Costo: ${fmtE(meseCosto)}`,M,y);y+=3;
      const rows=meseL.map(l=>[l.date.split(',')[0],l.cli,l.com,l.mat,l.pdesc,fmt(l.pp,2),l.sfu&&l.psf>0?fmt(l.psf,2):'—',l.sf&&!l.sfu&&l.psf>0?fmt(l.psf,2):'—',fmtE(l.ctot)]);
      doc.autoTable({startY:y,margin:{left:M,right:M},headStyles:{fillColor:[34,40,56],textColor:200,fontSize:7},bodyStyles:{fontSize:7},head:[['Data','Cliente','Commessa','Mat.','Pezzo','Peso kg','Sf.♻️','Sf.🗑','Costo']],body:rows});
      y=doc.lastAutoTable.finalY+10;
    }
    // Totali
    if(y>250){doc.addPage();y=20;}
    doc.setFillColor(20,24,32);doc.rect(M,y-4,W-M*2,8,'F');
    doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(249,115,22);doc.text('TOTALI ANNO '+anno,M+2,y+1);y+=12;

// ═══ CSV ═══
window.expCSV=function(){
  const lavReali=lav.filter(l=>!l._sfPersoManuale&&!l.manuale);
  if(!lavReali.length)return;
  let c='Data,Cliente,Commessa,Materiale,Colata,Pezzo,Peso_pezzo_kg,Sfrido_kg,Tipo_sfrido,Sottratto_kg,EuroKg,Costo_EUR,Costo_cliente_EUR\n';
  lavReali.forEach(l=>{
    // v4.3.3: costo cliente = peso lamiera tagliata × €/kg
    const cc=+((l.pp||0)*(l.ckg||0)).toFixed(2);
    c+=`${l.date},${l.cli},${l.com},${l.mat},${l.col||''},"${l.pdesc}",${fmt(l.pp,3)},${fmt(l.psf||0,3)},${l.sf?(l.sfu?'Riutilizzabile':'Perso'):'—'},${fmt(l.psot,3)},${fmt(l.ckg,2)},${fmt(l.ctot,2)},${fmt(cc,2)}\n`;
  });
  const b=new Blob([c],{type:'text/csv'});const a=document.createElement('a');
  a.href=URL.createObjectURL(b);a.download='metaltrack_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

// ═══ KEYBOARD ═══
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&S.modal){S.modal=null;render();return;}
  const k=e.key;
  if(/^[0-9]$/.test(k)||k==='Backspace'){
    const dig=k==='Backspace'?'⌫':k;
    if(!appUnlocked){loginKey(dig);return;}
    if(S.modal&&S.modal.type==='changepin'){cpKey(dig);return;}
    if(S.modal&&S.modal.type==='pin'){pinKey(dig);return;}
  }
});

showLogin();
