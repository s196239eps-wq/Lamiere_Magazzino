<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="MetalTrack — Gestione lamiere, sfridi e costi">
<meta name="theme-color" content="#0C0F14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MetalTrack">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<title>MetalTrack — Waste Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1/dist/iife/sdk.min.js"></script>
<script>
function getJsPDF(){
  if(window.jspdf&&window.jspdf.jsPDF)return Promise.resolve(window.jspdf.jsPDF);
  if(window.jsPDF)return Promise.resolve(window.jsPDF);
  return new Promise((res,rej)=>{
    let n=0;const t=setInterval(()=>{
      if(window.jspdf&&window.jspdf.jsPDF){clearInterval(t);res(window.jspdf.jsPDF);}
      else if(window.jsPDF){clearInterval(t);res(window.jsPDF);}
      else if(++n>30){clearInterval(t);rej(new Error('jsPDF non caricata.'));}
    },200);
  });
}
</script>
<style>
:root{--bg:#0C0F14;--bg2:#141820;--bg3:#1A1F2B;--bg4:#222838;--border:#2A3040;--border2:#353D50;--text:#E8ECF4;--text2:#9BA3B5;--text3:#6B7385;--accent:#F97316;--accent2:#FB923C;--accent-bg:rgba(249,115,22,.08);--accent-border:rgba(249,115,22,.25);--green:#22C55E;--green-bg:rgba(34,197,94,.08);--red:#EF4444;--red-bg:rgba(239,68,68,.08);--blue:#3B82F6;--blue-bg:rgba(59,130,246,.08);--yellow:#EAB308;--radius:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
#app{min-height:100dvh;display:flex;flex-direction:column}

/* ── NAV ── */
.nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:100;gap:8px}
.nav-brand{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--accent);letter-spacing:1px;white-space:nowrap;flex-shrink:0}
.nav-brand span{color:var(--text3);font-weight:400}
.nav-tabs{display:flex;gap:2px;margin-left:12px;flex:1;min-width:0}
.ntb{padding:6px 12px;border-radius:20px;border:none;background:transparent;color:var(--text2);font:500 12px 'DM Sans',sans-serif;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.ntb:hover{color:var(--text);background:var(--bg3)}
.ntb.active{color:var(--accent);background:var(--accent-bg);font-weight:700}
.ham{display:none;background:0;border:0;color:var(--text);cursor:pointer;padding:8px;flex-shrink:0;min-width:40px;min-height:40px;align-items:center;justify-content:center}
/* ── CONNECTION DOT ── */
.conn-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;transition:all .5s}
.conn-dot.online{background:var(--green);box-shadow:0 0 6px rgba(34,197,94,.7)}
.conn-dot.syncing{background:var(--yellow);box-shadow:0 0 6px rgba(234,179,8,.7);animation:pulse-y .9s infinite}
.conn-dot.offline{background:var(--text3);box-shadow:none}
.conn-dot.pending{background:var(--yellow);box-shadow:0 0 6px rgba(234,179,8,.5);animation:pulse-y 1.4s infinite}
@keyframes pulse-y{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes rt-flash{0%{transform:scale(1);box-shadow:0 0 0 0 rgba(34,197,94,.7)}50%{transform:scale(1.6);box-shadow:0 0 0 6px rgba(34,197,94,0)}100%{transform:scale(1);box-shadow:0 0 6px rgba(34,197,94,.7)}}
.conn-dot.rt-flash{animation:rt-flash .6s ease}
.conn-wrap{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3);flex-shrink:0;font-family:'Space Mono',monospace;margin-left:4px;cursor:default}
.mmenu{display:none;position:fixed;top:56px;left:0;right:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:6px;z-index:99;flex-direction:column;gap:2px}
.mmenu.open{display:flex}

/* ── MOBILE NAV ── */
@media(max-width:820px){
  .nav-tabs{display:none}
  .ham{display:flex}
  .nav{padding:0 12px;gap:6px}
  .nav-brand{font-size:13px}
  .conn-wrap span#conn-lbl{display:none}
  .mmenu .ntb{width:100%;justify-content:flex-start;padding:14px 16px;font-size:15px;border-radius:8px;min-height:48px}
}

/* ── LAYOUT ── */
.main{flex:1;padding:20px;max-width:1400px;width:100%;margin:0 auto}
@media(max-width:768px){.main{padding:10px 8px}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:14px}
@media(max-width:768px){.card{padding:12px 10px;margin-bottom:10px}}
.chd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
@media(max-width:480px){.chd{gap:8px}}
.ct{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px}

/* ── TABLES (desktop scroll, mobile card-list) ── */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:11px}
th{font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);padding:8px 6px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:6px;border-bottom:1px solid var(--border);color:var(--text2);white-space:nowrap;vertical-align:middle}
tr:hover td{background:var(--bg3)}
tr.exh td{opacity:.4}

/* ── MAGAZZINO: sempre card-view (mai scroll orizzontale) ── */
/* Ogni riga magazzino diventa una card compatta con grid interna.
   Si adatta automaticamente: 2 colonne su desktop large, 1 su mobile. */
.mag-cards{overflow:visible}
.mag-cards table{display:block}
.mag-cards thead{display:none}
.mag-cards tbody{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:10px}
.mag-cards tbody tr{display:grid;grid-template-columns:repeat(2,1fr);gap:6px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;transition:border-color .15s}
.mag-cards tbody tr:hover{border-color:var(--border2)}
.mag-cards tbody tr.exh{opacity:.5}
.mag-cards tbody td{display:flex;flex-direction:column;align-items:flex-start;gap:3px;padding:2px 0;border:none;font-size:11px;white-space:normal;min-height:auto;line-height:1.3}
.mag-cards tbody td[data-l]::before{content:attr(data-l);font-family:'Space Mono',monospace;font-size:8.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);opacity:.8}
.mag-cards tbody td[data-l=""]::before,.mag-cards tbody td:not([data-l])::before{display:none}
/* Nascondi celle informative vuote: se contengono solo whitespace e non hanno input, non servono */
.mag-cards tbody td[data-l="Sfrido ♻️"]:empty,
.mag-cards tbody td[data-l="Sfrido 🗑"]:empty{display:none}
/* Campi che occupano due colonne (più importanti) */
.mag-cards tbody td[data-l="Materiale"],
.mag-cards tbody td[data-l="Dim mm"]{grid-column:span 2}
/* Ultima td = i bottoni azione, su tutta la riga, allineati a destra */
.mag-cards tbody td:last-child{grid-column:span 2;flex-direction:row;justify-content:flex-end;gap:6px;margin-top:4px;padding-top:8px;border-top:1px solid var(--border)}
.mag-cards tbody td:last-child::before{display:none}
/* Input inline compatti dentro card */
.mag-cards tbody td .ie,.mag-cards tbody td input.ie,.mag-cards tbody td select.ie{width:100%;max-width:100%;font-size:12px;padding:4px 6px;height:28px;text-align:left}
.mag-cards tbody td .ie.ie-n{width:55px;display:inline-block}
/* Mobile: singola colonna interna */
@media(max-width:560px){
  .mag-cards tbody{grid-template-columns:1fr}
  .mag-cards tbody tr{grid-template-columns:1fr;padding:12px}
  .mag-cards tbody td[data-l="Materiale"],
  .mag-cards tbody td[data-l="Dim mm"]{grid-column:span 1}
  .mag-cards tbody td:last-child{grid-column:span 1}
  .mag-cards tbody td .ie{font-size:14px;height:36px;padding:6px 8px}
}

/* ── MOBILE CARD-LIST per altre tabelle (commesse, storico, sfridi) ── */
@media(max-width:700px){
  /* Sfridi, Commesse: ogni <tr> diventa una card */
  .mob-cards thead{display:none}
  .mob-cards tbody tr{display:block;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;padding:12px 14px;position:relative}
  .mob-cards tbody tr.exh{opacity:.45}
  .mob-cards tbody td{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border:none;border-bottom:1px solid var(--border);font-size:13px;white-space:normal;min-height:38px}
  .mob-cards tbody td:last-child{border-bottom:none;padding-top:10px;justify-content:flex-end;gap:6px}
  .mob-cards tbody td[data-l]::before{content:attr(data-l);font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);flex-shrink:0;margin-right:8px;min-width:90px}
  .mob-cards tbody td[data-l]:empty{display:none}
  /* Input inline nelle card mobile: full width */
  .mob-cards tbody td .ie,
  .mob-cards tbody td input.ie,
  .mob-cards tbody td select.ie{width:100%;max-width:100%;font-size:14px;padding:6px 8px;height:36px}
}

/* ── BUTTONS ── */
.btn{padding:7px 16px;border-radius:7px;border:1px solid var(--border);font:600 12px 'DM Sans',sans-serif;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;-webkit-tap-highlight-color:transparent;touch-action:manipulation;min-height:36px}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-p:hover:not(:disabled){background:var(--accent2)}
.btn-g{background:0;color:var(--text2)}.btn-g:hover{color:var(--text);background:var(--bg3)}
.btn-d{background:var(--red-bg);color:var(--red);border-color:rgba(239,68,68,.2)}
.btn-s{padding:5px 11px;font-size:11px}
.btn-bl{background:var(--blue-bg);color:var(--blue);border-color:rgba(59,130,246,.2)}
.btn-gr{background:var(--green-bg);color:var(--green);border-color:rgba(34,197,94,.2)}
@media(max-width:480px){
  .btn{min-height:40px;padding:8px 14px;font-size:12px}
  .btn-s{min-height:36px;padding:6px 12px;font-size:12px}
}

/* ── BADGES ── */
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600}
.b-ok{background:var(--green-bg);color:var(--green)}.b-ex{background:var(--red-bg);color:var(--red)}

/* ── INLINE EDITABLE INPUTS (tabelle desktop) ── */
.ie{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:3px 5px;border-radius:4px;font:11px 'DM Sans',sans-serif;width:58px;outline:0;text-align:right}
.ie:focus{border-color:var(--accent)}.ie-w{width:78px}.ie-n{width:48px}
select.ie{width:85px;text-align:left;cursor:pointer}

/* ── FORM GRID ── */
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:14px}
@media(max-width:600px){.fg{grid-template-columns:1fr}}
@media(min-width:601px) and (max-width:900px){.fg{grid-template-columns:1fr 1fr}}
.fi{display:flex;flex-direction:column;gap:4px}
.fi.s2{grid-column:span 2}.fi.s3{grid-column:span 3}.fi.s1{grid-column:span 1}
@media(max-width:600px){.fi.s2,.fi.s3{grid-column:span 1}}
.fl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-family:'Space Mono',monospace}
.fx{padding:10px 12px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font:14px 'DM Sans',sans-serif;outline:0;transition:border .2s;width:100%;min-height:44px}
.fx:focus{border-color:var(--accent)}
select.fx{cursor:pointer}
@media(max-width:600px){
  .fx{font-size:16px;min-height:48px;padding:10px 14px} /* 16px previene zoom iOS */
}

/* ── CHECKBOXES ── */
.ck{display:flex;align-items:center;gap:10px;padding:13px 16px;background:var(--bg3);border-radius:7px;cursor:pointer;margin-bottom:6px;border:1px solid var(--border);transition:.15s;user-select:none;min-height:48px}
.ck.on{border-color:var(--accent-border);background:var(--accent-bg)}
.ck-b{width:22px;height:22px;border-radius:5px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s}
.ck.on .ck-b{background:var(--accent);border-color:var(--accent)}
.ck-b svg{display:none}.ck.on .ck-b svg{display:block}

/* ── MODALI ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
@media(min-width:601px){.mo{align-items:center;padding:14px}}
.md{background:var(--bg2);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:24px 20px;width:100%;max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch}
@media(min-width:601px){.md{border-radius:12px;max-width:620px;max-height:90vh;padding:24px}}
/* Handle bar per sheet mobile */
.md::before{content:'';display:block;width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
@media(min-width:601px){.md::before{display:none}}
.md-t{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;margin-bottom:16px}

/* ── RIEPILOGO ── */
.rp{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:12px}
.rr{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}.rr:last-child{border:none;font-weight:700;font-size:13px}

/* ── MISC ── */
.empty{text-align:center;padding:36px 20px;color:var(--text3);font-size:13px}
.footer{text-align:center;padding:16px;font-size:10px;color:var(--text3);border-top:1px solid var(--border);margin-top:auto;font-family:'Space Mono',monospace}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}.fade{animation:fadeIn .25s ease}
.sinfo{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:10px 14px;margin-bottom:10px;font-size:11px;color:var(--text2)}
.sr{display:flex;justify-content:space-between;padding:4px 0}

/* ── DASHBOARD GRIDS ── */
.dash-kpi{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:16px}
@media(max-width:480px){
  .dash-kpi{grid-template-columns:1fr 1fr;gap:10px}
  /* KPI più leggibili su mobile: padding maggiore, font più grandi */
  .dash-kpi .sinfo{padding:16px 14px !important;min-height:110px;display:flex;flex-direction:column;justify-content:center}
  .dash-kpi .fl{font-size:12px !important;letter-spacing:.8px}
  .dash-kpi .sinfo > div:nth-child(2){font-size:30px !important;margin-top:6px;line-height:1.1}
  .dash-kpi .sinfo > div:nth-child(3){font-size:12px !important;margin-top:4px}
}
.dash-eff{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
@media(max-width:480px){
  .dash-eff{grid-template-columns:1fr;gap:10px}
  .dash-eff .sinfo{padding:16px 14px !important}
  .dash-eff .fl{font-size:12px !important}
  .dash-eff span:not([style*="font-size"]){font-size:13px}
}

/* ── MATERIAL TOTALS CARDS ── */
.mat-totals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
@media(max-width:480px){.mat-totals-grid{grid-template-columns:1fr 1fr;gap:10px}}
.mat-card{border:1px solid;border-radius:10px;padding:14px 14px 10px;transition:transform .15s,box-shadow .15s;display:flex;flex-direction:column;gap:4px}
.mat-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.25)}
.mat-card-name{font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:700;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mat-card-kg{font-size:24px;font-weight:700;line-height:1.15;font-family:'DM Sans',sans-serif}
@media(max-width:480px){
  .mat-card{padding:14px 12px 10px;gap:6px}
  .mat-card-name{font-size:12px;letter-spacing:.8px}
  .mat-card-kg{font-size:26px;line-height:1.1}
  .mat-card-detail{font-size:12px !important}
  .mat-card-foot{font-size:11px !important}
}
.mat-card-detail{display:flex;gap:10px;font-size:10px;color:var(--text2);font-family:'Space Mono',monospace;flex-wrap:wrap}
.mat-card-foot{display:flex;gap:8px;font-size:9px;color:var(--text3);margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.06);font-family:'Space Mono',monospace;align-items:center}

/* ── Card title (CT) più grande su mobile ── */
@media(max-width:480px){
  .ct{font-size:14px !important}
  /* Date subtitle in dashboard - più leggibile */
  .chd > div:last-child:not(.btn){font-size:12px}
}

/* ── LOGIN ── */
.login-screen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:20px}
.login-logo{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:var(--accent);letter-spacing:3px;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--text3);margin-bottom:32px;letter-spacing:1px}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px 28px;max-width:320px;width:100%;text-align:center}
@media(max-width:380px){.login-card{padding:24px 16px}}
.login-title{font-family:'Space Mono',monospace;font-size:13px;color:var(--text2);margin-bottom:20px;letter-spacing:1px}

/* ── PIN ── */
.pin-dots{display:flex;gap:12px;justify-content:center;margin:14px 0}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);transition:.2s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto}
.pin-key{padding:16px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:20px;font-weight:700;cursor:pointer;text-align:center;transition:.15s;min-height:56px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.pin-key:active{background:var(--bg4);border-color:var(--accent)}
.pin-key.del{color:var(--red)}
@media(max-width:380px){.pin-grid{max-width:220px;gap:8px}.pin-key{font-size:18px;min-height:50px}}

/* ── STORICO TABS ── */
.stab{display:flex;gap:6px;margin-bottom:12px;padding-bottom:8px;flex-wrap:wrap}
.stab button{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font:500 12px 'DM Sans',sans-serif;cursor:pointer;transition:.15s;min-height:36px;touch-action:manipulation}
.stab button:hover{background:var(--bg3)}
.stab button.active{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-border);font-weight:700}
@media(max-width:480px){.stab button{flex:1;text-align:center;font-size:13px;min-height:40px}}

/* ── SFRIDO BADGES ── */
.sf-section{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px}
.sf-section-title{font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px}
.sf-used-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:var(--blue-bg);color:var(--blue)}
.sf-lost-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:var(--red-bg);color:var(--red)}

/* ── GUIDA ── */
.g-section{margin-bottom:28px}
.g-h1{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--accent);margin-bottom:6px;padding-bottom:8px;border-bottom:2px solid var(--accent-border)}

<body>
<div id="app"></div>
<script>
// ═══ SERVICE WORKER (installabilità + cache offline) ═══
// Manifest e SW sono file separati (manifest.json, sw.js) per compatibilità
// completa con GitHub Pages e installazione PWA su iOS/Android/Desktop.
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    // Cleanup eventuali vecchi SW registrati via blob (da versioni precedenti)
    navigator.serviceWorker.getRegistrations().then(regs=>{
      regs.forEach(r=>{
        if(r.active && r.active.scriptURL.startsWith('blob:')) r.unregister();
      });
    }).catch(()=>{});
    // Registra il SW reale
    navigator.serviceWorker.register('sw.js',{scope:'./'}).catch(e=>{
      console.warn('SW registration failed:', e);
    });
  });
}

// ═══ APPWRITE CONFIG ═══
const AW_ENDPOINT = 'https://fra.cloud.appwrite.io/v1';
const AW_PROJECT  = '69e48c9b00206149a652';
const AW_DB       = '69e48d53001cbfe3f77d';
const AW_COLS     = {mag:'magazzino',lav:'lavorazioni',sf:'sfridi',snaps:'snapshots',storici:'storici',mat:'materiali'};
const DOC_ID      = 'metaltrack_main';

let awClient, awDB;
let connStatus  = 'offline';  // 'online' | 'syncing' | 'offline' | 'pending'
let _pendingSave = false;      // c'è un salvataggio in attesa di connessione
let _saveTimer   = null;       // debounce timer
let _rtUnsubscribe = null;     // funzione per chiudere la subscription realtime
let _lastLocalWriteAt = 0;     // timestamp ultimo save() locale — anti-echo realtime
const _RT_ECHO_WINDOW = 2500;  // ms: eventi realtime arrivati entro questo tempo dopo una scrittura locale sono ignorati (sono il nostro stesso update)

function awInit(){
  try{
    const {Client, Databases} = Appwrite;
    awClient = new Client().setEndpoint(AW_ENDPOINT).setProject(AW_PROJECT);
    awDB = new Databases(awClient);
    awSubscribeRealtime();
  }catch(e){ console.warn('Appwrite SDK non disponibile', e); }
}

// ═══ APPWRITE REALTIME ═══
// Si sottoscrive agli eventi di tutte le collection. Quando un altro dispositivo
// modifica il database, riceviamo un messaggio WebSocket e aggiorniamo l'app
// senza bisogno di ricaricare la pagina.
function awSubscribeRealtime(){
  if(!awClient||!awClient.subscribe)return;
  if(_rtUnsubscribe){try{_rtUnsubscribe();}catch(e){}}
  // Canali: una subscription per ogni collection del nostro progetto
  const channels = Object.values(AW_COLS).map(col=>`databases.${AW_DB}.collections.${col}.documents.${DOC_ID}`);
  try{
    _rtUnsubscribe = awClient.subscribe(channels, evt=>{
      // Anti-echo: se abbiamo appena scritto noi, ignora il nostro stesso update
      if(Date.now()-_lastLocalWriteAt < _RT_ECHO_WINDOW) return;
      awHandleRealtimeEvent(evt);
    });
  }catch(e){
    console.warn('Realtime subscribe failed:', e);
  }
}

// Gestisce un singolo evento realtime. Aggiorna la variabile corretta in base
// alla collection ricevuta, salva in locale (no awSaveAll — non è una nostra modifica),
// e re-renderizza se l'utente non sta digitando in un input.
function awHandleRealtimeEvent(evt){
  try{
    const payload = evt.payload;
    if(!payload||!payload.$collectionId||payload.$id!==DOC_ID) return;
    const colId = payload.$collectionId;
    let data;
    try{ data = JSON.parse(payload.payload); }catch(e){ return; }
    // Trova la chiave interna in base al collection ID ricevuto
    const key = Object.keys(AW_COLS).find(k=>AW_COLS[k]===colId);
    if(!key) return;
    // Aggiorna la variabile corrispondente + localStorage
    const mapping = {
      mag:     {arr:()=>mag,      set:v=>{mag=v;},      ls:'st4m'},
      lav:     {arr:()=>lav,      set:v=>{lav=v;},      ls:'st4l'},
      sf:      {arr:()=>sfRiutil, set:v=>{sfRiutil=v;}, ls:'st4sf'},
      snaps:   {arr:()=>snaps,    set:v=>{snaps=v;},    ls:'st4s'},
      storici: {arr:()=>storici,  set:v=>{storici=v;},  ls:'st4st'},
      mat:     {arr:()=>materiali,set:v=>{materiali=v;},ls:'st4mat'}
    };
    const m = mapping[key]; if(!m) return;
    m.set(data);
    try{ localStorage.setItem(m.ls, JSON.stringify(data)); }catch(e){}
    // Ricalcola i residui del magazzino (indispensabile dopo update remoti di mag o lav)
    if(key==='mag'||key==='lav') recalc();
    // Re-render intelligente: se l'utente sta digitando in un input o in una modale,
    // evitiamo il render completo che perderebbe focus/testo. Facciamo solo renderPage
    // (aggiorna il contenuto ma non la nav né la modale aperta).
    if(appUnlocked){
      const ae = document.activeElement;
      const isEditing = ae && (ae.tagName==='INPUT'||ae.tagName==='SELECT'||ae.tagName==='TEXTAREA');
      if(S.modal||isEditing){
        // Piccolo indicatore flash sul pallino per segnalare dato aggiornato
        flashSyncDot();
      } else {
        renderPage();
        flashSyncDot();
      }
    }
  }catch(e){
    console.warn('Realtime handler error:', e);
  }
}

// Flash visivo sul pallino per indicare che un dato è arrivato dal realtime
let _flashTimer = null;
function flashSyncDot(){
  const dot = document.getElementById('conn-dot');
  if(!dot) return;
  dot.classList.add('rt-flash');
  if(_flashTimer) clearTimeout(_flashTimer);
  _flashTimer = setTimeout(()=>dot.classList.remove('rt-flash'), 600);
}

function setConn(s){
  connStatus = s;
  updateConnDot();
}

function updateConnDot(){
  const dot = document.getElementById('conn-dot');
  const lbl = document.getElementById('conn-lbl');
  if(!dot) return;
  dot.className = 'conn-dot ' + connStatus;
  const labels = {online:'SYNC', syncing:'SYNC…', offline:'', pending:'IN CODA'};
  lbl.textContent = labels[connStatus] ?? '';
}

// ── Lettura documento ──
async function awRead(colKey){
  if(!awDB) return null;
  try{
    const res = await awDB.getDocument(AW_DB, AW_COLS[colKey], DOC_ID);
    return JSON.parse(res.payload);
  }catch(e){
    if(e.code===404) return null;
    throw e;
  }
}

// ── Scrittura upsert ──
async function awWrite(colKey, data){
  if(!awDB) return;
  const payload = JSON.stringify(data);
  try{
    await awDB.updateDocument(AW_DB, AW_COLS[colKey], DOC_ID, {payload});
  }catch(e){
    if(e.code===404){
      await awDB.createDocument(AW_DB, AW_COLS[colKey], DOC_ID, {payload});
    } else { throw e; }
  }
}

// ── Carica tutto da Appwrite ──
async function awLoadAll(){
  setConn('syncing');
  try{
    const [rMag,rLav,rSf,rSnaps,rStorici,rMat] = await Promise.all([
      awRead('mag'), awRead('lav'), awRead('sf'), awRead('snaps'), awRead('storici'),
      awRead('mat').catch(()=>null)  // collection materiali opzionale (fallback graceful)
    ]);
    if(rMag    !==null){ mag      = rMag;     localStorage.setItem('st4m',  JSON.stringify(mag));      }
    if(rLav    !==null){ lav      = rLav;     localStorage.setItem('st4l',  JSON.stringify(lav));      }
    if(rSf     !==null){ sfRiutil = rSf;      localStorage.setItem('st4sf', JSON.stringify(sfRiutil)); }
    if(rSnaps  !==null){ snaps    = rSnaps;   localStorage.setItem('st4s',  JSON.stringify(snaps));    }
    if(rStorici!==null){ storici  = rStorici; localStorage.setItem('st4st', JSON.stringify(storici));  }
    if(rMat    !==null){ materiali= rMat;     localStorage.setItem('st4mat',JSON.stringify(materiali));}
    setConn('online');
    _pendingSave = false;
    return true;
  }catch(e){
    console.warn('awLoadAll error', e);
    setConn('offline');
    return false;
  }
}

// ── Salva tutto su Appwrite (con debounce 800ms) ──
function awSaveAll(){
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async()=>{
    if(!awDB || !navigator.onLine){
      _pendingSave = true;
      setConn('pending');
      return;
    }
    setConn('syncing');
    _lastLocalWriteAt = Date.now();  // anti-echo: marcatore per ignorare il nostro stesso update realtime
    try{
      // Scrittura materiali è "best-effort": se la collection non esiste su Appwrite
      // non blocca il resto del sync. L'utente può creare la collection 'materiali'
      // quando vuole dal pannello Appwrite.
      const writes = [
        awWrite('mag',     mag),
        awWrite('lav',     lav),
        awWrite('sf',      sfRiutil),
        awWrite('snaps',   snaps),
        awWrite('storici', storici),
        awWrite('mat',     materiali).catch(e=>console.warn('Collection materiali non trovata - skip',e))
      ];
      await Promise.all(writes);
      setConn('online');
      _pendingSave = false;
    }catch(e){
      console.warn('awSaveAll error', e);
      _pendingSave = true;
      setConn('pending');
    }
  }, 800);
}

// ── Auto-sync quando torna online ──
window.addEventListener('online', ()=>{
  if(_pendingSave){
    setConn('syncing');
    awSaveAll();
  } else {
    setConn('online');
  }
});
window.addEventListener('offline', ()=>{
  if(connStatus !== 'pending') setConn('offline');
});

// ═══ PIN AUTH ═══
let appUnlocked=false,loginDigits='';

function showLogin(){
  loginDigits='';
  document.getElementById('app').innerHTML=`
    <div class="login-screen">
      <div class="login-logo">METALTRACK</div>
      <div class="login-sub">WASTE MANAGER v4.3.3</div>
      <div class="login-card">
        <div class="login-title">🔒 INSERISCI PIN</div>
        <div class="pin-dots" id="login-dots">
          ${[0,1,2,3].map(i=>`<div class="pin-dot" id="lpd${i}"></div>`).join('')}
        </div>
        <div id="login-err" style="text-align:center;color:var(--red);font-size:12px;min-height:18px;margin-bottom:10px"></div>
        <div class="pin-grid">
          ${[1,2,3,4,5,6,7,8,9].map(k=>`<button class="pin-key" onclick="loginKey('${k}')">${k}</button>`).join('')}
          <span></span>
          <button class="pin-key" onclick="loginKey('0')">0</button>
          <button class="pin-key del" onclick="loginKey('⌫')">⌫</button>
        </div>
      </div>
    </div>`;
}

window.loginKey=function(k){
  if(k==='⌫'){loginDigits=loginDigits.slice(0,-1);}
  else if(loginDigits.length<4){loginDigits+=k;}
  [0,1,2,3].forEach(i=>{const d=document.getElementById('lpd'+i);if(d)d.className='pin-dot'+(i<loginDigits.length?' filled':'');});
  if(loginDigits.length===4){
    setTimeout(()=>{
      if(loginDigits===appConfig.pin){appUnlocked=true;render();}
      else{
        loginDigits='';
        const err=document.getElementById('login-err');
        if(err)err.textContent='PIN errato. Riprova.';
        [0,1,2,3].forEach(i=>{const d=document.getElementById('lpd'+i);if(d)d.className='pin-dot';});
      }
    },200);
  }
};

// ═══ UTILS ═══
const $=s=>document.querySelector(s);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const fmt=(n,d=2)=>n==null?'—':Number(n).toFixed(d);
const fmtE=n=>n==null?'—':('€ '+fmt(n));
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const MICO='<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>';
const CHK_SVG='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>';

// ═══ STATE ═══
let S={tab:'dashboard',mob:false,modal:null,magEsaOpen:false};
let mag=[],lav=[],snaps=[],sfRiutil=[],storici=[],materiali=[];
let appConfig={pin:'1234'};

// Lista materiali standard precaricata alla prima apertura
const MATERIALI_STD=[
  {id:'mat_std_acc',nome:'Acciaio',dens:7850},
  {id:'mat_std_alu',nome:'Alluminio',dens:2700},
  {id:'mat_std_ram',nome:'Rame',dens:8900},
  {id:'mat_std_ott',nome:'Ottone',dens:8500},
  {id:'mat_std_tit',nome:'Titanio',dens:4500},
  {id:'mat_std_ghi',nome:'Ghisa',dens:7200}
];

function load(){
  try{
    mag=JSON.parse(localStorage.getItem('st4m'))||[];
    lav=JSON.parse(localStorage.getItem('st4l'))||[];
    snaps=JSON.parse(localStorage.getItem('st4s'))||[];
    sfRiutil=JSON.parse(localStorage.getItem('st4sf'))||[];
    storici=JSON.parse(localStorage.getItem('st4st'))||[];
    materiali=JSON.parse(localStorage.getItem('st4mat'))||[];
    // Prima apertura: precarica i 6 materiali standard
    if(!materiali||materiali.length===0){
      materiali=MATERIALI_STD.map(m=>({...m}));
      localStorage.setItem('st4mat',JSON.stringify(materiali));
    }
    const cfg=JSON.parse(localStorage.getItem('st4cfg'));
    if(cfg)appConfig=Object.assign(appConfig,cfg);
    // Migrazione da v3
    ['st3m','st3l','st3s','st3sf','st3st','st3cfg'].forEach((k,i)=>{
      const v=localStorage.getItem(k);
      if(v){
        const keys=['st4m','st4l','st4s','st4sf','st4st','st4cfg'];
        if(!localStorage.getItem(keys[i]))localStorage.setItem(keys[i],v);
      }
    });
    // Migrazione v4.3.3: ricalcolo psot con logica uniforme
    // Vecchio: psot = sfu ? pp : pp+psf   -->   Nuovo: psot = (sfu && psf>0) ? max(0,pp-psf) : pp
    // Flag persistente per non ripetere la migrazione
    if(!localStorage.getItem('st4_mig43')){
      let migrated=0;
      lav.forEach(l=>{
        if(l._sfPersoManuale)return; // sfridi persi manuali sono già corretti (psot = psf)
        const newPsot = (l.sf && l.sfu && l.psf>0) ? Math.max(0,(l.pp||0)-(l.psf||0)) : (l.pp||0);
        if(Math.abs((l.psot||0)-newPsot)>0.001){ l.psot=+newPsot.toFixed(3); migrated++; }
      });
      localStorage.setItem('st4_mig43','1');
      if(migrated>0){
        localStorage.setItem('st4l',JSON.stringify(lav));
        console.log(`[v4.3.3] Migrate ${migrated} lavorazioni: psot ricalcolato con nuova logica.`);
      }
    }
  }catch(e){mag=[];lav=[];snaps=[];sfRiutil=[];storici=[];materiali=MATERIALI_STD.map(m=>({...m}));}
}
function save(){
  try{
    localStorage.setItem('st4m',JSON.stringify(mag));
    localStorage.setItem('st4l',JSON.stringify(lav));
    localStorage.setItem('st4s',JSON.stringify(snaps));
    localStorage.setItem('st4sf',JSON.stringify(sfRiutil));
    localStorage.setItem('st4st',JSON.stringify(storici));
    localStorage.setItem('st4mat',JSON.stringify(materiali));
    localStorage.setItem('st4cfg',JSON.stringify(appConfig));
  }catch(e){}
  // Sync automatico su Appwrite con debounce 800ms
  awSaveAll();
}

// ═══ CALC ═══
function calcItem(m){
  if(m.tipo==='lamiera'){
    const l=m.dim.l/1000,w=m.dim.w/1000,t=m.dim.t/1000;
    m.sup=+(l*w).toFixed(6);m.vol=+(l*w*t).toFixed(8);
  }else{
    const r=(m.dim.de/1000)/2,h=m.dim.lu/1000;
    m.sup=+(Math.PI*m.dim.de/1000*h).toFixed(6);m.vol=+(Math.PI*r*r*h).toFixed(8);
  }
  m.peso=+(m.vol*(m.dens||7850)).toFixed(3);
}

// recalc COMPLETO — usato solo all'avvio, dopo load dal cloud, dopo delete
function recalc(){
  // Passo 1: calcola geometria e imposta res=peso iniziale per tutti
  mag.forEach(m=>{calcItem(m);m.res=m.peso;});
  // Passo 2: costruisce mappa id→indice per lookup O(1) invece di find() O(n)
  const magIdx={};
  mag.forEach((m,i)=>magIdx[m.id]=i);
  // Passo 3: sottrae ogni lavorazione (incluso sfrido perso manuale con materiale sorgente)
  // L._sfPersoManuale SENZA sid è escluso (es. utente ha inserito senza scegliere lamiera)
  lav.forEach(l=>{
    if(!l.sid)return;
    const m=mag[magIdx[l.sid]];
    if(m)m.res=Math.max(0,m.res-l.psot);
  });
  // Passo 4: marca esauriti / ripristina se residuo torna positivo
  //
  // Logica: se un materiale aveva esa=true MA senza dataEsaurimentoManuale (cioè è stato
  // esaurito automaticamente per consumo), e ora il residuo è tornato positivo (es. dopo
  // eliminazione di una lavorazione o sfrido perso), riapriamo il materiale.
  // Se invece l'utente ha esaurito MANUALMENTE (flag _esaManuale), rispettiamo la sua scelta.
  const oggi=new Date().toLocaleDateString('it-IT');
  mag.forEach(m=>{
    if(m.res<=0.001 && !m.esa){
      m.esa=true;
      if(!m.dataEsaurimento)m.dataEsaurimento=oggi;
    } else if(m.res>0.001 && m.esa && !m._esaManuale){
      // Esaurito per consumo ma ora il residuo è tornato positivo → riapri
      m.esa=false;
      m.dataEsaurimento='';
    }
  });
}

// recalcOne — ricalcola UN SOLO materiale per modifiche inline (chDim, dens, ecc.)
// Evita di riscorrere tutto il magazzino per una singola modifica di campo
function recalcOne(idx){
  const m=mag[idx];
  if(!m)return;
  calcItem(m);
  m.res=m.peso;
  lav.forEach(l=>{
    if(l.sid!==m.id)return;
    m.res=Math.max(0,m.res-l.psot);
  });
  const oggi=new Date().toLocaleDateString('it-IT');
  if(m.res<=0.001 && !m.esa){
    m.esa=true;
    if(!m.dataEsaurimento)m.dataEsaurimento=oggi;
  } else if(m.res>0.001 && m.esa && !m._esaManuale){
    m.esa=false;
    m.dataEsaurimento='';
  }
}

// ═══ STORICO AUTO ═══
function checkStorico(){
  const now=new Date();
  const key=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  // Non chiama save() direttamente — viene già chiamato dalla sequenza di init
  if(!storici.find(s=>s.key===key))creaSnapshotMese(key,now);
}
function creaSnapshotMese(key,data){
  const lavMese=lav.filter(l=>{
    if(!l.date)return false;
    const p=l.date.split('/');
    const [yy,mm]=key.split('-');
    return p.length>=3&&p[1]===mm&&p[2].startsWith(yy);
  });
  const snap={
    id:uid(),key,
    date:(data||new Date()).toLocaleDateString('it-IT'),
    magazzino:mag.map(m=>({col:m.col,mat:m.mat,tipo:m.tipo,peso:m.peso,res:m.res,ckg:m.ckg||0,esa:m.esa})),
    sfRiutil:sfRiutil.map(s=>({...s})),
    totSfUsato:sfRiutil.filter(s=>!s.usato).reduce((a,s)=>a+s.peso,0),
    totSfUsatoVal:sfRiutil.filter(s=>!s.usato).reduce((a,s)=>a+s.peso*(s.ckg||0),0),
    totSfPerso:lav.filter(l=>l.sf&&!l.sfu&&l.psf>0).reduce((a,l)=>a+l.psf,0),
    valoreMag:mag.reduce((a,m)=>a+m.res*(m.ckg||0),0),
    lavorazioni:lavMese.map(l=>({...l}))
  };
  storici.push(snap);
}
window.generaStorico=function(){
  const now=new Date();
  const key=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const idx=storici.findIndex(s=>s.key===key);
  if(idx>=0)storici.splice(idx,1);
  creaSnapshotMese(key,now);
  save();render();
  alert('Snapshot '+key+' aggiornato!');
};

window.pinKey=function(k){
  if(k==='⌫'){pinState.digits=pinState.digits.slice(0,-1);}

  if(pinState.digits.length===4){
    setTimeout(()=>{
      if(pinState.digits===appConfig.pin){S.modal=null;pinState.callback();}
      else{pinState.digits='';const err=document.getElementById('pin-err');if(err)err.textContent='PIN errato. Riprova.';[0,1,2,3].forEach(i=>{const d=document.getElementById('pd'+i);if(d)d.className='pin-dot';});}

  }
};

function rDashboard(){
  const lamiere=mag.filter(m=>m.tipo==='lamiera'&&!m.esa);
  const tondi=mag.filter(m=>m.tipo==='tondo'&&!m.esa);
  const lamiereEsa=mag.filter(m=>m.tipo==='lamiera'&&m.esa);
  const tondiEsa=mag.filter(m=>m.tipo==='tondo'&&m.esa);
  const totValMag=mag.reduce((a,m)=>a+m.res*(m.ckg||0),0);
  const totSfRiutPeso=sfRiutil.filter(s=>!s.usato).reduce((a,s)=>a+s.peso,0);
  const totSfRiutVal=sfRiutil.filter(s=>!s.usato).reduce((a,s)=>a+s.peso*(s.ckg||0),0);
  // lavReali = lavorazioni vere (escludono sfridi persi manuali perché NON sono pezzi prodotti)
  const lavReali=lav.filter(l=>!l._sfPersoManuale);
  const totPezzi=lavReali.length;
  const totPesoProd=lavReali.reduce((a,l)=>a+l.pp,0);
  // FIX: totali sfrido perso includono TUTTI gli sfridi persi (lavorazioni + manuali)
  const totSfPersoKg=lav.filter(l=>l.sf&&!l.sfu&&l.psf>0).reduce((a,l)=>a+l.psf,0);
  const totSfRiutKg=lavReali.filter(l=>l.sfu&&l.psf>0).reduce((a,l)=>a+l.psf,0);
  const totInput=totPesoProd+totSfPersoKg;
  const effUso=totInput>0?(totPesoProd/totInput*100):100;
  const totCostoPz=lavReali.reduce((a,l)=>a+l.ctot,0);
  const totMargineSf=lavReali.filter(l=>l.sfu&&l.psf>0).reduce((a,l)=>a+(l.psf||0)*(l.ckg||0),0);

  function magEff(m){
    const lavM=lavReali.filter(l=>l.sid===m.id);
    const ppTot=lavM.reduce((a,l)=>a+l.pp,0);
    // FIX: sfPerso per materiale include anche manuali (filtro su lav, non lavReali)
    const sfPerso=lav.filter(l=>l.sid===m.id&&l.sf&&!l.sfu&&l.psf>0).reduce((a,l)=>a+l.psf,0);
    const sfRiut=lavM.filter(l=>l.sfu&&l.psf>0).reduce((a,l)=>a+l.psf,0);
    const usato=ppTot+sfPerso;
    const eff=usato>0?(ppTot/usato*100):100;
    return{ppTot,sfPerso,sfRiut,usato,eff,nLav:lavM.length};
  }
  const magAttivi=mag.filter(m=>!m.esa&&m.peso>0);

  return`<div class="card">
    <div class="chd"><div class="ct">Dashboard</div>
      <div style="font-size:11px;color:var(--text3)">${new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
    </div>
    <div class="dash-kpi">
      <div class="sinfo" style="margin-bottom:0;text-align:center">
        <div class="fl">Lamiere attive</div>
        <div style="font-size:28px;font-weight:700;color:var(--text)">${lamiere.length}</div>
        <div style="font-size:10px;color:var(--text3)">${lamiereEsa.length} esaurite</div>
      </div>
      <div class="sinfo" style="margin-bottom:0;text-align:center">
        <div class="fl">Tondi attivi</div>
        <div style="font-size:28px;font-weight:700;color:var(--text)">${tondi.length}</div>
        <div style="font-size:10px;color:var(--text3)">${tondiEsa.length} esauriti</div>
      </div>
      <div class="sinfo" style="margin-bottom:0;text-align:center;border-color:var(--accent-border)">
        <div class="fl">Valore magazzino</div>
        <div style="font-size:18px;font-weight:700;color:var(--accent)">${fmtE(totValMag)}</div>
        <div style="font-size:10px;color:var(--text3)">residuo × €/kg</div>
      </div>
      <div class="sinfo" style="margin-bottom:0;text-align:center;border-color:rgba(59,130,246,.3)">
        <div class="fl">Sfridi ♻️ disponibili</div>
        <div style="font-size:18px;font-weight:700;color:var(--blue)">${fmt(totSfRiutPeso,1)} kg</div>
        <div style="font-size:10px;color:var(--blue)">${fmtE(totSfRiutVal)}</div>
      </div>
      <div class="sinfo" style="margin-bottom:0;text-align:center">
        <div class="fl">Lavorazioni totali</div>
        <div style="font-size:28px;font-weight:700;color:var(--text)">${totPezzi}</div>
        <div style="font-size:10px;color:var(--text3)">${fmt(totPesoProd,1)} kg prodotti</div>
      </div>
      <div class="sinfo" style="margin-bottom:0;text-align:center;border-color:rgba(239,68,68,.2)">
        <div class="fl">Sfrido perso totale</div>
        <div style="font-size:18px;font-weight:700;color:var(--red)">${fmt(totSfPersoKg,1)} kg</div>
        <div style="font-size:10px;color:var(--text3)">da inizio</div>
      </div>
    </div>
    <div class="dash-eff">
      <div class="sinfo" style="margin-bottom:0">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px">Efficienza Uso Materiale</span>
          <span style="font-weight:800;font-size:16px;color:${effUso>=90?'var(--green)':effUso>=70?'var(--yellow)':'var(--red)'}">${fmt(effUso,1)}%</span>
        </div>
        <div style="background:var(--bg4);border-radius:6px;height:10px;overflow:hidden;margin-bottom:6px">
          <div style="height:100%;width:${Math.min(effUso,100)}%;background:${effUso>=90?'var(--green)':effUso>=70?'var(--yellow)':'var(--red)'};border-radius:6px"></div>
        </div>
        <div style="font-size:10px;color:var(--text3)">Sfrido perso: ${fmt(totSfPersoKg,1)} kg | Sfrido ♻️: ${fmt(totSfRiutKg,1)} kg</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">100% = zero sfrido perso.</div>
      </div>
      <div class="sinfo" style="margin-bottom:0">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px">Margine da Sfridi ♻️</span>
          <span style="font-weight:800;font-size:16px;color:var(--blue)">${fmtE(totMargineSf)}</span>
        </div>
        <div style="background:var(--bg4);border-radius:6px;height:10px;overflow:hidden;margin-bottom:6px">
          <div style="height:100%;width:${totCostoPz>0?Math.min(totMargineSf/totCostoPz*100,100):0}%;background:var(--blue);border-radius:6px"></div>
        </div>
        <div style="font-size:10px;color:var(--text3)">Sfridi già incassati, disponibili per rivendita.</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">In magazzino: ${fmtE(totSfRiutVal)} disponibili.</div>
      </div>
    </div>
  </div>
  ${(()=>{
    // ═══ TOTALI PER MATERIALE — schede dinamiche ═══
    // Aggrega i kg residui del magazzino raggruppando per nome materiale (case-insensitive).
    // Include anche gli sfridi riutilizzabili disponibili. Le schede si creano automaticamente
    // per ogni nuovo materiale presente in magazzino.
    const totaliMat={};
    mag.forEach(m=>{
      if(m.esa||m.res<=0.001)return;
      const key=(m.mat||'Non specificato').trim();
      if(!totaliMat[key])totaliMat[key]={nome:key,resKg:0,nLamiere:0,nTondi:0,valore:0,sfridoKg:0};
      totaliMat[key].resKg+=m.res;
      totaliMat[key].valore+=m.res*(m.ckg||0);
      if(m.tipo==='lamiera')totaliMat[key].nLamiere++;
      else totaliMat[key].nTondi++;
    });
    sfRiutil.filter(s=>!s.usato&&s.peso>0).forEach(s=>{
      const key=(s.mat||'Non specificato').trim();
      if(!totaliMat[key])totaliMat[key]={nome:key,resKg:0,nLamiere:0,nTondi:0,valore:0,sfridoKg:0};
      totaliMat[key].sfridoKg+=s.peso;
      totaliMat[key].valore+=s.peso*(s.ckg||0);
    });
    const matList=Object.values(totaliMat).sort((a,b)=>b.resKg+b.sfridoKg-(a.resKg+a.sfridoKg));
    if(matList.length===0)return'';
    // Colori pastello distintivi ciclici — il materiale mantiene lo stesso colore nel tempo
    // perché assegnato tramite hash deterministico del nome.
    const PALETTE=[
      {bg:'rgba(249,115,22,.08)',bd:'rgba(249,115,22,.35)',fg:'var(--accent)'},
      {bg:'rgba(59,130,246,.08)',bd:'rgba(59,130,246,.35)',fg:'var(--blue)'},
      {bg:'rgba(34,197,94,.08)',bd:'rgba(34,197,94,.35)',fg:'var(--green)'},
      {bg:'rgba(234,179,8,.10)',bd:'rgba(234,179,8,.40)',fg:'var(--yellow)'},
      {bg:'rgba(168,85,247,.10)',bd:'rgba(168,85,247,.35)',fg:'#c084fc'},
      {bg:'rgba(239,68,68,.08)',bd:'rgba(239,68,68,.30)',fg:'var(--red)'},
      {bg:'rgba(20,184,166,.10)',bd:'rgba(20,184,166,.35)',fg:'#2dd4bf'},
      {bg:'rgba(236,72,153,.10)',bd:'rgba(236,72,153,.35)',fg:'#f472b6'}
    ];
    const colorFor=nome=>{
      let h=0;for(let i=0;i<nome.length;i++)h=((h<<5)-h+nome.charCodeAt(i))|0;
      return PALETTE[Math.abs(h)%PALETTE.length];
    };
    const totGen=matList.reduce((a,m)=>a+m.resKg+m.sfridoKg,0);
    return`<div class="card">
      <div class="chd"><div class="ct">Totali per Materiale</div>
        <div style="font-size:11px;color:var(--text3)">${matList.length} tipi | ${fmt(totGen,1)} kg totali (magazzino + sfridi ♻️)</div>
      </div>
      <div class="mat-totals-grid">
        ${matList.map(m=>{const c=colorFor(m.nome);const tot=m.resKg+m.sfridoKg;return`
          <div class="mat-card" style="background:${c.bg};border-color:${c.bd}">
            <div class="mat-card-name" style="color:${c.fg}">${esc(m.nome)}</div>
            <div class="mat-card-kg" style="color:${c.fg}">${fmt(tot,1)} <span style="font-size:12px;font-weight:500;opacity:.85">kg</span></div>
            <div class="mat-card-detail">
              ${m.resKg>0?`<span>📦 ${fmt(m.resKg,1)} kg</span>`:''}
              ${m.sfridoKg>0?`<span style="color:var(--blue)">♻️ ${fmt(m.sfridoKg,1)} kg</span>`:''}
            </div>
            <div class="mat-card-foot">
              ${m.nLamiere>0?`<span title="Lamiere">L:${m.nLamiere}</span>`:''}
              ${m.nTondi>0?`<span title="Tondi">T:${m.nTondi}</span>`:''}
              <span style="margin-left:auto;font-weight:600;color:var(--text2)">${fmtE(m.valore)}</span>
            </div>
          </div>
        `;}).join('')}
      </div>
    </div>`;
  })()}
  ${magAttivi.length===0?'':`<div class="card">
    <div class="chd"><div class="ct">Efficienza per Materiale</div>
      <div style="font-size:11px;color:var(--text3)">Basata sulle lavorazioni registrate</div>
    </div>
    <div class="tw"><table class="mob-cards">
      <thead><tr><th>Colata</th><th>Materiale</th><th>Tipo</th><th>Peso kg</th><th>Residuo kg</th><th>€/kg</th><th>Lav.</th><th>Prodotto</th><th>Sfrido ♻️</th><th>Sfrido perso</th><th>Eff. uso</th></tr></thead>
      <tbody>${magAttivi.map(m=>{
        const e=magEff(m);
        const effCol=e.eff>=90?'var(--green)':e.eff>=70?'var(--yellow)':'var(--red)';
        return`<tr>
          <td data-l="Colata">${esc(m.col||'—')}</td>
          <td data-l="Materiale" style="font-weight:600;color:var(--text)">${esc(m.mat)}</td>
          <td data-l="Tipo"><span style="font-size:10px;color:var(--text3)">${m.tipo}</span></td>
          <td data-l="Peso kg">${fmt(m.peso,2)}</td>
          <td data-l="Residuo kg" style="color:${m.res<m.peso*.1?'var(--red)':'var(--green)'};font-weight:600">${fmt(m.res,2)}</td>
          <td data-l="€/kg">${fmt(m.ckg,2)}</td>
          <td data-l="Lav." style="text-align:center">${e.nLav}</td>
          <td data-l="Prodotto" style="color:var(--accent)">${fmt(e.ppTot,2)} kg</td>
          <td data-l="Sfrido ♻️" style="color:var(--blue)">${e.sfRiut>0?fmt(e.sfRiut,2)+' kg':'—'}</td>
          <td data-l="Sfrido perso" style="color:var(--red)">${e.sfPerso>0?fmt(e.sfPerso,2)+' kg':'—'}</td>
          <td data-l="Efficienza">
            <div style="display:flex;align-items:center;gap:6px">
              <div style="background:var(--bg4);border-radius:3px;height:6px;width:60px;overflow:hidden">
                <div style="height:100%;width:${e.nLav===0?100:Math.min(e.eff,100)}%;background:${effCol};border-radius:3px"></div>
              </div>
              <span style="font-weight:700;color:${effCol};font-size:11px">${e.nLav===0?'N/D':fmt(e.eff,0)+'%'}</span>
            </div>
          </td>
        </tr>`;
      }).join('')}</tbody></table></div>
  </div>`}`;
}

// ═══ MAGAZZINO ═══
// Diviso in 3 sezioni: Lamiere attive, Tondi attivi, Materiali Esauriti (collapsibile).
// L'indice passato a mRow() è sempre l'indice reale dentro l'array mag[] — mantiene
// la coerenza dei bindings onchange.
function rMag(){
  const lamiereAtt=[], tondiAtt=[], esauriti=[];
  mag.forEach((m,i)=>{
    const item={m,i};
    if(m.esa) esauriti.push(item);
    else if(m.tipo==='lamiera') lamiereAtt.push(item);
    else tondiAtt.push(item);
  });
  // Totali rapidi per badge di sezione
  const totLam=lamiereAtt.reduce((a,x)=>a+x.m.res,0);
  const totTon=tondiAtt.reduce((a,x)=>a+x.m.res,0);
  const valEsa=esauriti.reduce((a,x)=>a+x.m.peso*(x.m.ckg||0),0);

  const renderSection=(items,emptyMsg)=>items.length===0
    ? `<div class="empty" style="padding:20px 10px">${emptyMsg}</div>`
    : `<div class="mag-cards"><table>
        <thead><tr><th>Colata</th><th>Materiale</th><th>Tipo</th><th>Dimensioni mm</th><th>Sup m²</th><th>Vol m³</th><th>Dens kg/m³</th><th>Peso kg</th><th>€/kg</th><th>Valore</th><th>Residuo kg</th><th>Data Ins.</th><th>Data Esaur.</th><th>Stato</th><th>Sfrido ♻️</th><th>Sfrido 🗑</th><th></th></tr></thead>
        <tbody>${items.map(({m,i})=>mRow(m,i)).join('')}</tbody></table></div>`;

  return`
  <div class="card"><div class="chd"><div class="ct">Magazzino Materiali</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn btn-p btn-s" onclick="S.modal={type:'add'};render()">+ Aggiungi</button>
      <button class="btn btn-bl btn-s" onclick="snap()">Snapshot</button>
      <button class="btn btn-g btn-s" onclick="S.modal={type:'snaps'};render()">Storico Snap</button>
    </div></div>
    ${mag.length===0?'<div class="empty">Magazzino vuoto — premi "+ Aggiungi" per iniziare</div>':''}
  </div>

  ${lamiereAtt.length>0 || tondiAtt.length>0 || mag.length===0 ? `
  <div class="card">
    <div class="chd">
      <div class="ct" style="display:flex;align-items:center;gap:10px">
        <span style="width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block"></span>
        📦 Lamiere Attive
      </div>
      <div style="font-size:11px;color:var(--text2);font-family:'Space Mono',monospace">
        ${lamiereAtt.length} in magazzino · ${fmt(totLam,1)} kg disponibili
      </div>
    </div>
    ${renderSection(lamiereAtt,'Nessuna lamiera attiva')}
  </div>

  <div class="card">

window.toggleEsaManuale=function(i){
  const m=mag[i];if(!m)return;

window.asfCalc=function(){
  const magVal=document.getElementById('asf_mag').value;
  let dens=7850,ckg=0,mat='',col='',tipo='lamiera',spessore=0;
  if(magVal&&magVal!=='__manuale__'){
    const m=mag.find(x=>x.id===magVal);
    if(m){dens=m.dens||7850;ckg=m.ckg||0;mat=m.mat;col=m.col||'';tipo=m.tipo;spessore=m.tipo==='lamiera'?m.dim.t:m.dim.de;}
  }else if(magVal==='__manuale__'){
    dens=+(document.getElementById('asf_dens')?.value||7850);
    ckg=+(document.getElementById('asf_ckg')?.value||0);
  }
  const forma=document.getElementById('asf_forma').value;
  const calc=document.getElementById('asf_calc');
  const saveBtn=document.getElementById('asf_save');
  let peso=0,desc='',sup=0,vol=0;
  if(forma==='peso_diretto'){
    peso=+(document.getElementById('asf_peso_dir')?.value||0);
    desc=document.getElementById('asf_desc_dir')?.value||'diretto';
    spessore=0;
  }else{
    const d1=+(document.getElementById('asf_d1')?.value||0);
    const d2=+(document.getElementById('asf_d2')?.value||0);
    const sp=+(document.getElementById('asf_sp')?.value||0);
    if(!sp){calc.style.display='none';saveBtn.disabled=true;return;}
    spessore=sp;
    if(forma==='lamiera_rett'){
      if(!d1||!d2){calc.style.display='none';saveBtn.disabled=true;return;}
      sup=(d1/1000)*(d2/1000);vol=sup*(sp/1000);desc=`${d1}×${d2}×${sp}mm`;
    }else if(forma==='disco'){
      if(!d1){calc.style.display='none';saveBtn.disabled=true;return;}
      const r=(d1/1000)/2;sup=Math.PI*r*r;vol=sup*(sp/1000);desc=`Ø${d1}×${sp}mm`;
    }else if(forma==='anello'){
      if(!d1||!d2||d2>=d1){calc.style.display='none';saveBtn.disabled=true;return;}
      const re=(d1/1000)/2,ri=(d2/1000)/2;sup=Math.PI*(re*re-ri*ri);vol=sup*(sp/1000);desc=`Ø${d1}/Ø${d2}×${sp}mm`;
    }
    peso=+(vol*dens).toFixed(3);
  }
  if(peso<=0){calc.style.display='none';saveBtn.disabled=true;return;}
  calc.style.display='block';saveBtn.disabled=false;
  calc.innerHTML=`<div class="sr"><span>Forma:</span><span>${esc(desc)}</span></div>
    ${sup>0?`<div class="sr"><span>Superficie:</span><span>${fmt(sup,4)} m²</span></div>`:''} 
    ${vol>0?`<div class="sr"><span>Volume:</span><span>${fmt(vol,6)} m³</span></div>`:''}
    <div class="sr"><span><strong>Peso calcolato:</strong></span><span style="color:var(--green);font-weight:700"><strong>${fmt(peso,3)} kg</strong></span></div>
    <div class="sr"><span>Valore:</span><span style="color:var(--accent)">${fmtE(peso*ckg)}</span></div>`;
};

  }else if(magVal==='__manuale__'){

  const forma=document.getElementById('asf_forma').value;

    const sp=+(document.getElementById('asf_sp')?.value||0);
    spessore=sp;
    if(forma==='lamiera_rett'){sup=(d1/1000)*(d2/1000);var vol=sup*(sp/1000);desc=`${d1}×${d2}×${sp}mm`;formaNome='rettangolare';}
    else if(forma==='disco'){const r=(d1/1000)/2;sup=Math.PI*r*r;var vol=sup*(sp/1000);desc=`Ø${d1}×${sp}mm`;formaNome='disco';}
    else if(forma==='anello'){const re=(d1/1000)/2,ri=(d2/1000)/2;sup=Math.PI*(re*re-ri*ri);var vol=sup*(sp/1000);desc=`Ø${d1}/Ø${d2}×${sp}mm`;formaNome='anello';}
    peso=+(vol*dens).toFixed(3);
  }
  if(peso<=0)return;
  sfRiutil.push({id:uid(),date:new Date(dateVal).toLocaleDateString('it-IT'),mat,col,tipo,forma:formaNome,desc,peso,ckg,spessore,dens,note,usato:false,manuale:true,magSrc:magVal!=='__manuale__'?magVal:null});
  save();S.modal=null;render();
};

function lvGetSel(){
  const val=$('#lv_s')?.value||'';
  if(!val)return null;
  if(val.startsWith('mag:')){
    const m=mag.find(x=>x.id===val.slice(4));
    return m?{...m,_isSf:false,_sfId:null,_resDisp:m.res}:null;
  }
  if(val.startsWith('sf:')){
    const s=sfRiutil.find(x=>x.id===val.slice(3));if(!s)return null;
    let spessore=s.spessore||0;
    if(!spessore&&s.lavId){const lo=lav.find(x=>x.id===s.lavId);if(lo)spessore=lo.spessore||0;}
    if(!spessore){const mo=mag.find(x=>x.mat===s.mat&&x.col===s.col&&x.tipo===s.tipo);if(mo)spessore=mo.tipo==='lamiera'?mo.dim.t:mo.dim.de;}
    const dimCalc=s.tipo==='lamiera'?{l:9999,w:9999,t:spessore||1}:{de:spessore||50,lu:9999};
    return{id:s.id,mat:s.mat,col:s.col,tipo:s.tipo,dim:dimCalc,dens:s.dens||7850,peso:s.peso,res:s.peso,ckg:s.ckg||0,spessore,_isSf:true,_sfId:s.id,_sfObj:s,_resDisp:s.peso};
  }
  return null;
}

window.lvC=function(){
  const sh=lvGetSel();if(!sh)return;
  const a=+(($('#lv_a')?.value)||0),b=+(($('#lv_b')?.value)||0);
  const spInput=+(($('#lv_sp')?.value)||0);
  const spEff=sh._isSf?(spInput||sh.spessore||1):(sh.tipo==='lamiera'?sh.dim.t:sh.dim.de);
  if(a<=0){$('#lvPI').innerHTML='';$('#lvS').style.display='none';$('#lvPr').innerHTML='';$('#lvB').disabled=true;return;}
  let sup,vol,peso,desc;
  const formaLav = sh.tipo==='lamiera' ? (document.getElementById('lv_forma')?.value || 'rett') : 'tondo';
  if(sh.tipo==='lamiera'){
    const sp=spEff/1000;
    if(formaLav==='disco'){
      // Disco: a = Ø esterno. Area = π × (Ø/2)²
      const r=(a/1000)/2;sup=Math.PI*r*r;desc=`Ø${a}×${spEff}mm`;
    } else if(b>0){
      sup=(a/1000)*(b/1000);desc=`${a}×${b}×${spEff}mm`;
    } else {
      sup=(a/1000)*(a/1000);desc=`${a}×${a}×${spEff}mm`;
    }
    vol=sup*sp;
  }else{
    const r=(spEff/1000)/2;sup=Math.PI*r*r;vol=sup*(a/1000);desc=`Ø${spEff}×${a}mm`;
  }
  peso=vol*(sh.dens||7850);
  const disponibile=sh._resDisp;
  let alertHtml='';
  if(peso>disponibile)alertHtml=`<div style="background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.4);border-radius:8px;padding:12px;margin-top:8px;color:var(--red)"><strong>⚠️ Materiale insufficiente!</strong> Pezzo: ${fmt(peso,3)} kg | Disponibile: ${fmt(disponibile,3)} kg</div>`;
  let sfSuggestHtml='';
  if(!sh._isSf&&peso>0&&peso<=disponibile){
    const sfComp=sfRiutil.filter(s=>!s.usato&&s.tipo===sh.tipo&&s.peso>=peso&&s.mat===sh.mat);
    if(sfComp.length>0){const sf=sfComp.sort((a,z)=>a.peso-z.peso)[0];sfSuggestHtml=`<div style="background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.35);border-radius:8px;padding:12px;margin-top:8px;color:var(--blue)"><strong>💡 Usa uno sfrido esistente!</strong><br><span style="font-size:11px">${esc(sf.mat)} — ${esc(sf.desc||'')} (${fmt(sf.peso,3)} kg) — considera di usarlo per risparmiare materiale.</span></div>`;}
  }
  $('#lvPI').innerHTML=`<div class="sinfo"><div class="sr"><span>Lamiera tagliata:</span><span>${desc}</span></div><div class="sr"><span>Sup:</span><span>${fmt(sup,4)} m²</span></div><div class="sr"><span>Vol:</span><span>${fmt(vol,6)} m³</span></div><div class="sr"><span><strong>Peso lamiera tagliata:</strong></span><span><strong style="color:var(--accent)">${fmt(peso,3)} kg</strong></span></div></div>${alertHtml}${sfSuggestHtml}`;
  const sv=$('#lvS');sv.style.display='block';
  // v4.3.3: checkbox "🗑 Cestina tutto sfrido" compare SOLO quando lo sfrido NON è riutilizzabile.
  // Se attiva, nasconde i campi forma/dimensioni e lo sfrido = residuo rimanente della sorgente.
  sv.innerHTML=`<div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin:12px 0 8px">Sfrido generato</div>
    <div class="ck on" id="ck_sf"><div class="ck-b">${CHK_SVG}</div><div style="font-size:12px">C'è sfrido</div></div>
    <div id="sfF">
      <div class="ck on" id="ck_su"><div class="ck-b">${CHK_SVG}</div><div style="font-size:12px">Sfrido riutilizzabile (salvato in Sfridi)</div></div>
      <div id="ck_trash_wrap" style="display:none">
        <div class="ck" id="ck_trash" style="border-color:rgba(239,68,68,.3)"><div class="ck-b">${CHK_SVG}</div><div style="font-size:12px;color:var(--red)">🗑 Cestina tutto lo sfrido rimanente (marca la sorgente come ESAURITA)</div></div>
      </div>
      <div id="sfDetails">
        <div class="fg">
          <div class="fi s2"><label class="fl">Forma sfrido</label>
            <select class="fx" id="sf_t" onchange="sfFormaLav()">
              <option value="rett">Lastra rettangolare (L × W)</option>
              <option value="disco">Disco pieno (Ø est.)</option>
              <option value="anello">Anello (Ø est. / Ø int.)</option>
              <option value="peso">⚖️ Peso diretto (kg) — senza dimensioni</option>
            </select>
          </div>
        </div>
        <div id="sfDimsLav" class="fg"></div>
        <div id="sfI"></div>
      </div>
    </div>`;
  document.getElementById('ck_sf').addEventListener('click',function(){
    this.classList.toggle('on');
    document.getElementById('sfF').style.display=this.classList.contains('on')?'block':'none';
    lvP();
  });
  // Checkbox "Riutilizzabile": quando NON spuntata, mostra il riquadro "Cestina tutto"
  document.getElementById('ck_su').addEventListener('click',function(){
    this.classList.toggle('on');
    const isRiut = this.classList.contains('on');
    const trashWrap = document.getElementById('ck_trash_wrap');
    if(trashWrap) trashWrap.style.display = isRiut ? 'none' : 'block';
    // Se torno a "riutilizzabile", disattiva automaticamente "cestina tutto"
    if(isRiut){
      const trash = document.getElementById('ck_trash');
      if(trash && trash.classList.contains('on')){
        trash.classList.remove('on');
        const det=document.getElementById('sfDetails');
        if(det)det.style.display='block';
      }
    }
    lvP();
  });
  // Checkbox "Cestina tutto": nasconde i dettagli dimensioni/forma
  // e imposta lo sfrido = residuo della sorgente (tutto quello che rimane è perso).
  document.getElementById('ck_trash').addEventListener('click',function(){
    this.classList.toggle('on');
    const isOn=this.classList.contains('on');
    const det=document.getElementById('sfDetails');
    if(det)det.style.display=isOn?'none':'block';
    lvP();
  });
  // Inizializza: "Cestina tutto" visibile solo se NON riutilizzabile
  const suInit = document.getElementById('ck_su');
  const trashWrapInit = document.getElementById('ck_trash_wrap');
  if(suInit && trashWrapInit){
    trashWrapInit.style.display = suInit.classList.contains('on') ? 'none' : 'block';
  }
  sfFormaLav();
  lvP();
}

    : (d.hsf?`<div class="rr"><span>Peso sfrido (${d.sfForma})</span><span>${fmt(d.psf,3)} kg — <span class="${d.sfu?'sf-used-badge':'sf-lost-badge'}">${d.sfu?'Riutilizzabile ✅':'Perso ❌'}</span></span></div>`:'');

function gLD(){
  const sh=lvGetSel();if(!sh)return null;
  const cl=$('#lv_cl')?.value?.trim(),co=$('#lv_co')?.value?.trim();
  const a=+(($('#lv_a')?.value)||0);if(!a||!cl||!co)return null;
  const b=+(($('#lv_b')?.value)||0);
  const spInput=+(($('#lv_sp')?.value)||0);
  const spEff=sh._isSf?(spInput||sh.spessore||1):(sh.tipo==='lamiera'?sh.dim.t:sh.dim.de);
  const formaLav = sh.tipo==='lamiera' ? (document.getElementById('lv_forma')?.value || 'rett') : 'tondo';
  let sup,vol,pp,desc;
  if(sh.tipo==='lamiera'){
    const sp=spEff/1000;
    if(formaLav==='disco'){
      // Taglio circolare: a = Ø esterno
      const r=(a/1000)/2;sup=Math.PI*r*r;vol=sup*sp;desc=`Ø${a}×${spEff}mm`;
    } else {
      sup=b>0?(a/1000)*(b/1000):(a/1000)*(a/1000);vol=sup*sp;
      desc=b>0?`${a}×${b}×${spEff}mm`:`${a}×${a}×${spEff}mm`;
    }
    pp=+(vol*(sh.dens||7850)).toFixed(3);
  }else{
    const r=(spEff/1000)/2;sup=Math.PI*r*r;vol=sup*(a/1000);desc=`Ø${spEff}×${a}mm`;
    pp=+(vol*(sh.dens||7850)).toFixed(3);
  }
  const ckSf=document.getElementById('ck_sf');
  const sfFEl=document.getElementById('sfF');
  const hsf=ckSf?.classList?.contains('on')&&sfFEl?.style?.display!=='none';
  // Flag "cestina tutto sfrido": lo sfrido = residuo della sorgente, perso
  const trashAll = hsf && document.getElementById('ck_trash')?.classList?.contains('on');
  let psf=0,sfInfo=null,sfForma='';
  if(hsf){
    if(trashAll){
      // Tutto ciò che rimane nella sorgente dopo il taglio del pezzo viene buttato
      // psf = residuo_disponibile - pp (tutto ciò che non è il pezzo prodotto)
      const restante = Math.max(0, sh._resDisp - pp);
      psf = +restante.toFixed(3);
      sfForma = 'cestinato';
      sfInfo = {tipo:'cestinato',d1:0,d2:0,sup:0,vol:0,peso:psf};
      const si=document.getElementById('sfI');
      if(si) si.innerHTML=`<div class="sinfo" style="border-color:rgba(239,68,68,.3)"><div class="sr"><span style="color:var(--red)"><strong>🗑 Sfrido cestinato (tutto il residuo):</strong></span><span style="color:var(--red)"><strong>${fmt(psf,3)} kg</strong></span></div><div style="font-size:10px;color:var(--text3);margin-top:4px">La sorgente verrà marcata come ESAURITA al salvataggio</div></div>`;
    } else {
      const st=document.getElementById('sf_t')?.value||'rett';
      sfForma=st;
      if(st==='peso'){
        // Peso diretto: nessuna dimensione, solo kg
        const pkg=+(document.getElementById('sf_pkg')?.value||0);
        if(pkg>0){
          psf=+pkg.toFixed(3);
          sfInfo={tipo:'peso',d1:0,d2:0,sup:0,vol:0,peso:psf};
          const si=document.getElementById('sfI');
          if(si)si.innerHTML=`<div class="sinfo"><div class="sr"><span><strong>Peso sfrido (diretto):</strong></span><span style="color:var(--blue)"><strong>${fmt(psf,3)} kg</strong></span></div></div>`;
        }
      } else {
        const sa=+(document.getElementById('sf_a')?.value||0);
        const sb=+(document.getElementById('sf_b')?.value||0);
        const thick=spEff/1000;
        if(sa>0){
          let ssup=0,svol=0;
          if(st==='rett'){const l1=sa/1000,l2=(sb||sa)/1000;ssup=l1*l2;svol=ssup*thick;}
          else if(st==='disco'){const r=(sa/1000)/2;ssup=Math.PI*r*r;svol=ssup*thick;}
          else if(st==='anello'){const re=(sa/1000)/2,ri=(sb/1000)/2;ssup=Math.PI*(re*re-ri*ri);svol=ssup*thick;}
          psf=+(svol*(sh.dens||7850)).toFixed(3);
          sfInfo={tipo:st,d1:sa,d2:sb,sup:ssup,vol:svol,peso:psf};
          const si=document.getElementById('sfI');
          if(si)si.innerHTML=`<div class="sinfo"><div class="sr"><span>Sup sfrido:</span><span>${fmt(ssup,4)} m²</span></div><div class="sr"><span>Vol:</span><span>${fmt(svol,6)} m³</span></div><div class="sr"><span><strong>Peso sfrido:</strong></span><span style="color:var(--blue)"><strong>${fmt(psf,3)} kg</strong></span></div></div>`;
        }
      }
    }
  }
  // sfu: riutilizzabile solo se NON è "cestina tutto" e se la checkbox è attiva
  const sfu = !trashAll && hsf && document.getElementById('ck_su')?.classList?.contains('on');
  // LOGICA UNIFORME v4.3.3.1:
  // La quantità effettivamente "prelevata" dalla sorgente (magazzino o sfrido) è sempre pp
  // — perché pp è il peso materiale che esce dalla lamiera/sfrido origine per fare la
  // lavorazione (include al suo interno il peso del pezzo prodotto + quello che diventa sfrido).
  //
  // Eccezione quando la SORGENTE è un materiale di MAGAZZINO (lamiera/tondo):
  //   - se lo sfrido generato è RIUTILIZZABILE (torna in Sfridi ♻️): sottrazione netta = pp - psf
  //     (perché psf entra come entità separata in Sfridi, quindi materiale "recuperato")
  //   - se lo sfrido è PERSO o assente: sottrazione = pp (tutto il taglio esce dal magazzino)
  //
  // Quando la SORGENTE è uno SFRIDO riutilizzabile esistente:
  //   - psot = pp sempre (altrimenti creeremmo materiale dal nulla duplicando l'entrata in Sfridi).
  //     Lo sfrido generato sarà comunque registrato a parte (in Sfridi ♻️ se riutilizzabile).
  let psot;
  if(trashAll){
    // Cestina tutto: sottrai l'INTERO residuo disponibile, la sorgente sarà esaurita
    psot = sh._resDisp;
  } else if(sh._isSf){
    psot = pp;
  } else {
    psot = (hsf && sfu && psf>0) ? Math.max(0, pp - psf) : pp;
  }
  return{sh,cl,co,a,b,sup,vol,pp,desc,hsf,psf,sfInfo,sfu,psot,spEff,sfForma,trashAll};
}

window.subLav=function(){
  const d=gLD();if(!d)return;
  if(d.pp>d.sh._resDisp){alert('⚠️ Materiale insufficiente.');return;}
  const l={
    id:uid(),date:new Date().toLocaleString('it-IT'),
    cli:d.cl,com:d.co,
    sid:d.sh._isSf?null:d.sh.id,
    sfSid:d.sh._isSf?d.sh._sfId:null,
    mat:d.sh.mat,col:d.sh.col,tipo:d.sh.tipo,
    pdesc:d.desc,sup:d.sup,vol:d.vol,pp:d.pp,
    sf:d.sfInfo,sfu:d.sfu,psf:d.psf,psot:d.psot,
    ckg:d.sh.ckg,ctot:+(d.pp*d.sh.ckg).toFixed(2),
    dens:d.sh.dens,spessore:d.spEff||0,fromSfrido:d.sh._isSf,
    _trashAll:!!d.trashAll  // flag: se true, la sorgente è stata esaurita via "cestina tutto"
    // NOTA: NO flag manuale, NO _sfPersoManuale — questa è una lavorazione reale
  };
  lav.push(l);
  if(d.sh._isSf&&d.sh._sfId){
    const sfIdx=sfRiutil.findIndex(x=>x.id===d.sh._sfId);
    if(sfIdx>=0){sfRiutil[sfIdx].peso=Math.max(0,sfRiutil[sfIdx].peso-d.psot);if(sfRiutil[sfIdx].peso<=0.001)sfRiutil[sfIdx].usato=true;}
  }
  if(d.sfu&&d.sfInfo&&d.psf>0){
    sfRiutil.push({
      id:uid(),date:new Date().toLocaleDateString('it-IT'),
      mat:d.sh.mat,col:d.sh.col,tipo:d.sh.tipo,
      forma:d.sfForma,
      desc:`da ${d.desc} — ${d.sfForma==='rett'?`${d.sfInfo.d1}×${d.sfInfo.d2}mm`:d.sfForma==='disco'?`Ø${d.sfInfo.d1}mm`:d.sfForma==='anello'?`Ø${d.sfInfo.d1}/Ø${d.sfInfo.d2}mm`:'peso diretto'}`,
      peso:d.psf,ckg:d.sh.ckg,spessore:d.spEff||0,dens:d.sh.dens||7850,
      lavId:l.id,note:'',usato:false
    });
  }
  recalc();
  // v4.3.3: se è stato attivato "Cestina tutto", esaurisce automaticamente la sorgente
  // senza chiedere conferma (l'utente ha già espresso la volontà con la checkbox).
  // Altrimenti, nessun prompt — l'utente può esaurire manualmente dal magazzino.
  if(d.trashAll){
    if(!d.sh._isSf){
      const m=mag.find(x=>x.id===d.sh.id);
      if(m&&!m.esa){
        m.esa=true;
        m.res=0;
        if(!m.dataEsaurimento)m.dataEsaurimento=new Date().toLocaleDateString('it-IT');
      }
    } else {
      const sfSrc=sfRiutil.find(x=>x.id===d.sh._sfId);
      if(sfSrc){sfSrc.usato=true;sfSrc.peso=0;}
    }
  }
  save();S.modal={type:'rep',data:l};render();
}

window.delLav=function(id){
  askPin('PIN per eliminare lavorazione',()=>{
    const i=lav.findIndex(x=>x.id===id);
    if(i<0)return;
    const l=lav[i];
    // 1. Se la sorgente era uno SFRIDO riutilizzabile esistente, ripristina il peso consumato
    //    e riattivalo se era stato marcato "usato" (vale anche per trashAll su sfrido).
    if(l.sfSid){
      const sfSrc=sfRiutil.find(x=>x.id===l.sfSid);
      if(sfSrc){
        sfSrc.peso=+(sfSrc.peso+(l.psot||0)).toFixed(3);
        sfSrc.usato=false;
      }
    }
    // 2. Rimuovi lo sfrido riutilizzabile GENERATO da questa lavorazione (se l'aveva creato).
    //    Se già consumato da altre lavorazioni, chiedi conferma.
    const sfGenIdx=sfRiutil.findIndex(x=>x.lavId===l.id);
    if(sfGenIdx>=0){
      const sfGen=sfRiutil[sfGenIdx];
      const sfConsumato=lav.some(x=>x.sfSid===sfGen.id && x.id!==l.id);
      if(sfConsumato){
        if(!confirm(
          `⚠️ Lo sfrido riutilizzabile generato da questa lavorazione è stato usato in altre lavorazioni.\n\n`+
          `Eliminare comunque? Lo sfrido generato resterà in "Sfridi" ma con peso aggiornato.\n`+
          `Le lavorazioni che usano quello sfrido NON verranno eliminate (dovresti eliminarle prima).`
        )){return;}
      } else {
        sfRiutil.splice(sfGenIdx,1);
      }
    }
    // 3. Se la sorgente era il MAGAZZINO ed era stata marcata "esaurita" da questa lavorazione
    //    (trashAll), riapri il materiale. Il ricalcolo successivo gestirà il residuo corretto.
    if(l.sid && l._trashAll){
      const m=mag.find(x=>x.id===l.sid);
      if(m){
        m.esa=false;
        m.dataEsaurimento='';
      }
    }
    // 4. Rimuovi la lavorazione
    lav.splice(i,1);
    // 5. Ricalcola TUTTO il magazzino (residui dalle lavorazioni rimaste) e salva
    recalc();
    save();
    render();
  });
};

window.delStorico=function(id){

};

  if(t==='rep')return rRep(S.modal.data);

}

    <div class="md-t">🗑 Aggiungi Sfrido Perso</div>
    <p style="font-size:12px;color:var(--text3);margin-bottom:12px">Seleziona la lamiera/tondo sorgente e inserisci i kg di sfrido perso. Il peso verrà <strong>scalato dal residuo</strong> del materiale selezionato.</p>
    <div class="fg">
      <div class="fi s2"><label class="fl">Materiale sorgente <span style="color:var(--red)">*</span></label>
        <select class="fx" id="asp_mag" onchange="aspMagChange()">
          <option value="">— Seleziona lamiera/tondo —</option>
          ${magOpt}
        </select>
      </div>
    </div>
    <div id="asp_info" style="display:none">
      <div id="asp_src_info" class="sinfo" style="margin-bottom:10px"></div>
      <div class="fg">

        <div class="fi"><label class="fl">€/kg</label><input class="fx" id="asp_ckg" type="number" placeholder="0.00" step="0.01" oninput="aspCalc()"></div>
        <div class="fi"><label class="fl">Data</label><input class="fx" id="asp_date" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
        <div class="fi s2"><label class="fl">Descrizione / Note (opzionale)</label><input class="fx" id="asp_pdesc" placeholder="es. sfrido da taglio"></div>
        <div class="fi"><label class="fl">Cliente (opzionale)</label><input class="fx" id="asp_cli" placeholder="—"></div>
        <div class="fi"><label class="fl">N° Commessa (opzionale)</label><input class="fx" id="asp_com" placeholder="—"></div>
      </div>
      <div id="asp_calc" class="sinfo" style="display:none;margin-bottom:10px"></div>
    </div>
    <div class="md-footer" style="margin-top:14px">
      <button class="btn btn-g" onclick="S.modal=null;render()">Annulla</button>

window.aspMagChange=function(){
  const sel=document.getElementById('asp_mag');
  const v=sel.value;
  const info=document.getElementById('asp_info');
  const srcInfo=document.getElementById('asp_src_info');
  if(!v){info.style.display='none';return;}
  info.style.display='block';
  const m=mag.find(x=>x.id===v);
  if(m){
    srcInfo.innerHTML=`<div class="sr"><span>Materiale</span><span style="color:var(--text);font-weight:600">${esc(m.mat)} ${m.col?'— '+esc(m.col):''}</span></div>
      <div class="sr"><span>Tipo</span><span>${m.tipo==='lamiera'?'Lamiera':'Tondo'}</span></div>
      <div class="sr"><span>Disponibile</span><span style="color:var(--green);font-weight:700">${fmt(m.res,3)} kg</span></div>
      <div class="sr"><span>€/kg</span><span>${fmt(m.ckg,2)}</span></div>`;
    // Pre-popola €/kg dal materiale
    const ckgInput=document.getElementById('asp_ckg');
    if(ckgInput&&!ckgInput.value)ckgInput.value=m.ckg||0;
  }
  aspCalc();
};
window.aspCalc=function(){
  const peso=+(document.getElementById('asp_peso')?.value||0);
  const ckg=+(document.getElementById('asp_ckg')?.value||0);
  const magVal=document.getElementById('asp_mag')?.value;
  const calc=document.getElementById('asp_calc');
  const saveBtn=document.getElementById('asp_save');
  if(!calc)return;
  if(peso>0&&magVal){
    const m=mag.find(x=>x.id===magVal);
    const disp=m?m.res:0;
    const excess=peso>disp+0.001;
    calc.style.display='block';
    calc.innerHTML=`<div class="sr"><span><strong>Peso sfrido perso</strong></span><span style="color:var(--red);font-weight:700">${fmt(peso,3)} kg</span></div>
      ${ckg>0?`<div class="sr"><span>Valore perso</span><span style="color:var(--red)">${fmtE(peso*ckg)}</span></div>`:''}
      <div class="sr"><span>Residuo lamiera dopo</span><span style="color:${excess?'var(--red)':'var(--green)'};font-weight:600">${fmt(Math.max(0,disp-peso),3)} kg</span></div>
      ${excess?`<div style="margin-top:6px;padding:6px 10px;background:var(--red-bg);color:var(--red);border-radius:4px;font-size:11px;font-weight:600">⚠️ Il peso supera il residuo disponibile (${fmt(disp,3)} kg)</div>`:''}`;
    if(saveBtn)saveBtn.disabled=excess;
  } else { 
    calc.style.display='none';

  }
};
window.aspSalva=function(){
  const magVal=document.getElementById('asp_mag').value;
  if(!magVal){alert('Seleziona il materiale sorgente.');return;}
  const peso=+(document.getElementById('asp_peso')?.value||0);
  if(peso<=0){alert('Inserire il peso dello sfrido perso.');return;}
  const m=mag.find(x=>x.id===magVal);
  if(!m){alert('Materiale sorgente non trovato.');return;}
  if(peso>m.res+0.001){
    alert(`Il peso (${fmt(peso,3)} kg) supera il residuo disponibile (${fmt(m.res,3)} kg).`);
    return;
  }
  const ckg=+(document.getElementById('asp_ckg')?.value||m.ckg||0);
  const cli=document.getElementById('asp_cli')?.value||'—';
  const com=document.getElementById('asp_com')?.value||'—';
  const pdesc=document.getElementById('asp_pdesc')?.value||'sfrido perso manuale';
  const dateVal=document.getElementById('asp_date')?.value||new Date().toISOString().slice(0,10);
  const entry={
    id:uid(),
    date:new Date(dateVal).toLocaleDateString('it-IT'),
    cli,com,
    mat:m.mat,col:m.col||'',tipo:m.tipo,
    sid:m.id,
    pdesc,
    pp:0,psf:peso,psot:peso,
    sf:true,sfu:false,
    ckg,ctot:0,
    dens:m.dens||7850,spessore:m.tipo==='lamiera'?m.dim.t:m.dim.de,
    _sfPersoManuale:true
  };
  lav.push(entry);
  // Sottrae immediatamente dal magazzino
  m.res=Math.max(0,m.res-peso);
  if(m.res<=0.001&&!m.esa){
    m.esa=true;
    if(!m.dataEsaurimento)m.dataEsaurimento=new Date().toLocaleDateString('it-IT');
  }
  save();
  S.modal=null;
  render();
};

      <button class="pin-key del" onclick="cpKey('⌫')">⌫</button>
    </div>

  </div></div>`;
}
window.cpKey=function(k){
  const step=cpState.step;
  if(k==='⌫'){cpState[step]=cpState[step].slice(0,-1);}
  else if(cpState[step].length<4){cpState[step]+=k;}
  [0,1,2,3].forEach(i=>{const d=document.getElementById('cpd'+i);if(d)d.className='pin-dot'+(i<cpState[step].length?' filled':'');});
  if(cpState[step].length===4){
    setTimeout(()=>{
      if(step==='old'){
        if(cpState.old===appConfig.pin){cpState.step='new1';cpState.err='';render();}
        else{cpState.old='';cpState.err='PIN attuale errato. Riprova.';render();}
      }else if(step==='new1'){cpState.step='new2';cpState.err='';render();}
      else if(step==='new2'){
        if(cpState.new1===cpState.new2){appConfig.pin=cpState.new1;save();S.modal=null;cpState={step:'old',old:'',new1:'',new2:'',err:''};render();setTimeout(()=>alert('✅ PIN cambiato!'),100);}
        else{cpState.new2='';cpState.err='I PIN non coincidono.';render();}
      }
    },200);
  }
};

window.pBolla=async function(id){

    doc.setFontSize(10);doc.setTextColor(155,163,181);doc.text('Bolla di Lavorazione',M,30);
    doc.setTextColor(255);doc.text('N. '+String(l.com),W-M,22,{align:'right'});doc.text(String(l.date),W-M,30,{align:'right'});

    });

    if(l.sf&&l.psf>0){rows.push(['Peso sfrido',fmt(l.psf,3),'kg']);rows.push(['Tipo sfrido',l.sfu?'Riutilizzabile':'Perso','']);}
    rows.push(['PESO SOTTRATTO MAG.',fmt(l.psot,3),'kg']);
    rows.push(['Costo/kg',fmtE(l.ckg),'']);

  }catch(e){alert('Errore PDF: '+e.message);}
